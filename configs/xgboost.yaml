model_name: xgboost
enabled: true

canonical_data_path: data/processed/discharge_daily.parquet
feature_frame_path: data/processed/xgboost/features_w5_h3.parquet
artifact_dir: artifacts/xgboost_w5_h3_simple

window_size: 5
horizons: [1, 2, 3]
include_window_stats: true
include_window_deltas: true

split_column: split
use_station_id_as_feature: true

train_fraction: 0.7
validation_fraction: 0.15

objective: reg:squarederror
eval_metric: [rmse, mae]
early_stopping_metric: rmse

num_boost_round: 300
early_stopping_rounds: 30
checkpoint_interval: 25
verbose_eval: 25

tree_method: hist
learning_rate: 0.05
max_depth: 4
min_child_weight: 2.0
subsample: 0.9
colsample_bytree: 0.9
reg_lambda: 1.0
reg_alpha: 0.0
seed: 42
verbosity: 1

model_name: xgboost
enabled: true

canonical_data_path: data/processed/discharge_daily.parquet
reanalysis_data_path: data/processed/reanalysis_daily.parquet
feature_frame_path: data/processed/xgboost/features_hydro_weather_w14_h3.parquet
artifact_dir: artifacts/advanced_seq/xgboost_hydro_weather_w14_h3

window_size: 14
horizons: [1, 2, 3]
include_current_observation: true
include_window_stats: true
include_window_deltas: true

split_column: split
use_station_id_as_feature: true

train_fraction: 0.7
validation_fraction: 0.15

objective: reg:squarederror
eval_metric: [rmse, mae]
early_stopping_metric: rmse

num_boost_round: 1000
early_stopping_rounds: 120
checkpoint_interval: 50
verbose_eval: 50

tree_method: hist
learning_rate: 0.03
max_depth: 6
min_child_weight: 1.5
subsample: 0.9
colsample_bytree: 0.7
reg_lambda: 1.5
reg_alpha: 0.0
seed: 42
verbosity: 1
